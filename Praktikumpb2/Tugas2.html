<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Login</title>
</head>
<body>

    <form action="" method="GET">

        <div>
            <h1>Formulir Login</h1>

            <label for="username">Masukan Nama:</label>
            <input 
                type="text" 
                id="username"
                name="username" 
                placeholder="Masukan nama Anda"
            >
        </div>

        <div>
            <label for="deskripsi">Deskripsikan diri lo:</label>
            <textarea 
                name="deskripsi" 
                id="deskripsi"
                rows="10" 
                cols="30" 
                placeholder="Saya adalah....."
            ></textarea>
        </div>

        <div>
            <label for="gender">Pilih Jenis Kelamin:</label>
            <select name="gender" id="gender">
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
                <option value="PR" selected>Pria</option>
            </select>
        </div>

        <div>
            <p>Pilih Salah Satu:</p>

            <input type="radio" name="pilihan" value="1" id="pil1">
            <label for="pil1">Pilihan 1</label>

            <input type="radio" name="pilihan" value="2" id="pil2">
            <label for="pil2">Pilihan 2</label>

            <input type="radio" name="pilihan" value="3" id="pil3">
            <label for="pil3">Pilihan 3</label>
        </div>

        <div>
            <p>Pilih Hobi:</p>

            <input type="checkbox" name="hobi[]" value="Futsal" id="futsal">
            <label for="futsal">Futsal</label>

            <input type="checkbox" name="hobi[]" value="Badminton" id="badminton">
            <label for="badminton">Badminton</label>

            <input type="checkbox" name="hobi[]" value="Padel" id="padel">
            <label for="padel">Padel</label>
        </div>

        <div>
            <label for="fileUpload">Upload:</label>
            <input type="file" name="fileUpload" id="fileUpload">
        </div>

        <div>
            <button type="submit">Kirim</button>
            <button type="button" onclick="alert('Halo!')">Klik Saya!</button>
        </div>

    </form>

</body>
</html>
